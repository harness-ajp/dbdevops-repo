databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: anthony.pahl@harness.io
      comment: Creates a basic users table for storing user information
      labels: "users,initial-setup"
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
      rollback:
        - dropTable:
            tableName: users
databaseChangeLog:
  - changeSet:
      id: add-customdata-column-to-users
      author: anthony.pahl@harness.io
      comment: Add CustomData column to users table for storing large text data
      labels: "users,customdata,schema-change"
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: CustomData
                  type: TEXT
      rollback:
        - dropColumn:
            tableName: users
            columnName: CustomData
databaseChangeLog:
  - changeSet:
      id: add-account-status-column-to-users2
      author: anthony.pahl@harness.io
      comment: Adds a new boolean column AccountStatus to the users table with a default value of true
      labels: "users,account-status2"
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: AccountStatus
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: users
            columnName: AccountStatus
